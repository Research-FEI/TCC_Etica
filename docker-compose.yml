services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tcc-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE=mongodb://mongo:27017/tcc
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ./api:/app
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tcc-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
  
  mongo:
    image: mongo:latest
    container_name: tcc-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  hf_cache:
